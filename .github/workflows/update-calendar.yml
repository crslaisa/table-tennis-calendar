name: update-calendar

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: self-hosted
    # No `defaults.run.shell` override here. This runner is a bare Windows
    # machine with no Git Bash/WSL on PATH ("bash: command not found" when
    # shell:bash was forced) -- so steps below run in this runner's actual
    # default shell, Windows PowerShell (powershell.exe 5.1, confirmed
    # present from the earlier execution-policy fix), and are written in
    # PowerShell-compatible syntax (no bash-only `||`/`&&` chaining).
    steps:
      - uses: actions/checkout@v4
        with:
          # Default clean:true runs `git clean -ffdx` before checkout, which
          # would delete weibo_cookie.txt (a manually-placed, gitignored,
          # untracked file -- see README "Weibo login wall") every run,
          # before run_pipeline.py even starts. clean:false leaves untracked
          # files alone while still updating tracked ones normally.
          clean: false

      # actions/setup-python (toolcache download) intermittently fails on
      # this self-hosted runner ("Error happened during Python
      # installation") -- it's been flaky, succeeding on some runs and
      # failing on others, likely a transient network/download issue on
      # this machine. Since the runner machine already has a real,
      # confirmed-working system Python (python.org install, verified via
      # `python --version` during runner setup), there's nothing to gain
      # from re-downloading an isolated one each run. Removed in favor of
      # whatever `python` is already on PATH for the runner service.

      - name: Run pipeline
        # max-pages 6: confirmed live (production run #22) that 3 pages
        # (~32 posts) was NOT enough -- during this tournament window the
        # account posts match-result recaps very fast (each completed match
        # gets its own recap post), so a schedule post from earlier in the
        # day (e.g. "7月1日中国队赛程") can already be 40-60 posts deep by
        # the time a 30-min job runs. 6 pages (~60+ posts) was confirmed via
        # tools/dump_posts.py to reach that post and complete in ~1.5min on
        # the self-hosted runner -- cheap enough to use as the standing
        # default rather than re-tuning this every time posting volume
        # spikes.
        run: python run_pipeline.py --max-pages 6

      - name: Commit and push if changed
        run: |
          git config user.name "calendar-bot"
          git config user.email "calendar-bot@users.noreply.github.com"
          git add feeds data
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Update schedule feeds"
          }
          git push
