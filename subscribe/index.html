<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>王楚钦 / 孙颖莎 赛程日历订阅</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #F5F6F8;
    color: #262626;
    font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: #1677FF; color: #fff; }
  .btn-pill {
    display: flex; align-items: center; gap: 9px;
    text-decoration: none; padding: 12px 20px;
    border-radius: 999px; font-size: 15px; font-weight: 500;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    cursor: pointer; border: 1px solid transparent; font-family: inherit;
  }
  .btn-primary-blue { background: #1677FF; color: #FFFFFF; border-color: #1677FF; }
  .btn-primary-blue:hover { background: #4096FF; border-color: #4096FF; }
  .btn-outline-blue { background: #FFFFFF; color: #262626; border-color: #D9D9D9; }
  .btn-outline-blue:hover { border-color: #1677FF; color: #1677FF; }
  .btn-primary-purple { background: #722ED1; color: #FFFFFF; border-color: #722ED1; }
  .btn-primary-purple:hover { background: #9254DE; border-color: #9254DE; }
  .btn-outline-purple { background: #FFFFFF; color: #262626; border-color: #D9D9D9; }
  .btn-outline-purple:hover { border-color: #722ED1; color: #722ED1; }
  .copy-btn-blue:hover { border-color: #1677FF !important; color: #1677FF !important; }
  .copy-btn-purple:hover { border-color: #722ED1 !important; color: #722ED1 !important; }
  @media (max-width: 640px) {
    #page-wrap { padding: 40px 16px 56px !important; }
    #page-title { font-size: 27px !important; }
    #cards-grid { grid-template-columns: 1fr !important; margin-top: 36px !important; }
    #footer-grid { grid-template-columns: 1fr !important; gap: 28px !important; }
  }
</style>
</head>
<body>
<div style="min-height:100vh;">
  <div style="height:3px; width:100%; display:flex;">
    <div style="flex:1; background:#1677FF;"></div>
    <div style="flex:1; background:#722ED1;"></div>
  </div>

  <div id="page-wrap" style="max-width:860px; margin:0 auto; padding:64px 24px 72px;">
    <header style="text-align:center;">
      <div id="kicker" style="font-size:12px; letter-spacing:0.22em; text-transform:uppercase; color:#8C8C8C; font-weight:500;"></div>
      <h1 id="page-title" style="font-weight:700; font-size:38px; line-height:1.28; margin:14px 0 0; letter-spacing:-0.01em;">
        <span style="color:#1677FF;" id="hdr-name1"></span>
        <span style="color:#BFBFBF; font-weight:400; padding:0 4px;">·</span>
        <span style="color:#722ED1;" id="hdr-name2"></span>
        <span style="color:#262626;" id="hdr-suffix"></span>
      </h1>
      <p id="subtitle" style="max-width:520px; margin:16px auto 0; font-size:15px; line-height:1.7; color:#8C8C8C;"></p>
      <div style="display:inline-flex; gap:2px; margin-top:28px; padding:3px; border-radius:9px; background:#EDEEF1;">
        <button id="btn-zh" onclick="setLang('zh')" style="border:none; cursor:pointer; padding:7px 22px; border-radius:7px; font-size:14px; font-weight:500; font-family:inherit;">中文</button>
        <button id="btn-en" onclick="setLang('en')" style="border:none; cursor:pointer; padding:7px 22px; border-radius:7px; font-size:14px; font-weight:500; font-family:inherit;">English</button>
      </div>
    </header>

    <div id="cards-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:48px;">
      <!-- Wang Chuqin -->
      <section style="background:#FFFFFF; border-radius:14px; padding:26px 24px; box-shadow:0 1px 2px rgba(0,0,0,0.04), 0 0 0 1px #ECEDF0;">
        <div style="display:flex; align-items:center; gap:18px;">
          <img src="wangchuqin.jpg" alt="王楚钦" style="width:66px; height:66px; flex-shrink:0; border-radius:50%; object-fit:cover; box-shadow:0 0 0 2px #EAF2FF;">
          <div>
            <div id="card1-name" style="font-size:18px; font-weight:700; color:#262626; line-height:1.2;"></div>
            <div style="display:flex; gap:6px; margin-top:8px;">
              <span id="c1-d1" style="font-size:12px; color:#1677FF; background:#EAF2FF; padding:3px 9px; border-radius:6px; font-weight:500;"></span>
              <span id="c1-d2" style="font-size:12px; color:#1677FF; background:#EAF2FF; padding:3px 9px; border-radius:6px; font-weight:500;"></span>
              <span id="c1-d3" style="font-size:12px; color:#1677FF; background:#EAF2FF; padding:3px 9px; border-radius:6px; font-weight:500;"></span>
            </div>
          </div>
        </div>
        <div style="height:1px; background:#F0F0F0; margin:22px 0;"></div>
        <div style="display:flex; flex-direction:column; gap:10px;">
          <a href="https://calendar.google.com/calendar/r?cid=webcal://crslaisa.github.io/table-tennis-calendar/feeds/wangchuqin.ics" target="_blank" rel="noopener" class="btn-pill btn-primary-blue">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><rect x="3.5" y="5" width="17" height="15.5" rx="2.5"/><line x1="3.5" y1="9.5" x2="20.5" y2="9.5"/><line x1="8" y1="3" x2="8" y2="6"/><line x1="16" y1="3" x2="16" y2="6"/></svg>
            <span id="c1-add-google"></span>
          </a>
          <a href="webcal://crslaisa.github.io/table-tennis-calendar/feeds/wangchuqin.ics" class="btn-pill btn-outline-blue">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><rect x="3.5" y="5" width="17" height="15.5" rx="2.5"/><line x1="3.5" y1="9.5" x2="20.5" y2="9.5"/><line x1="8" y1="3" x2="8" y2="6"/><line x1="16" y1="3" x2="16" y2="6"/></svg>
            <span id="c1-add-apple"></span>
          </a>
          <a href="https://outlook.live.com/calendar/0/addfromweb?url=https://crslaisa.github.io/table-tennis-calendar/feeds/wangchuqin.ics" target="_blank" rel="noopener" class="btn-pill btn-outline-blue">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><rect x="3.5" y="5" width="17" height="15.5" rx="2.5"/><line x1="3.5" y1="9.5" x2="20.5" y2="9.5"/><line x1="8" y1="3" x2="8" y2="6"/><line x1="16" y1="3" x2="16" y2="6"/></svg>
            <span id="c1-add-outlook"></span>
          </a>
        </div>
        <div style="display:flex; align-items:stretch; gap:8px; margin-top:16px;">
          <div style="flex:1; min-width:0; display:flex; align-items:center; padding:0 13px; border:1px solid #ECEDF0; border-radius:8px; background:#FAFAFB; font-family:'DM Mono', monospace; font-size:13px; color:#8C8C8C; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">…/feeds/wangchuqin.ics</div>
          <button onclick="copyFeed('wcq','https://crslaisa.github.io/table-tennis-calendar/feeds/wangchuqin.ics')" class="copy-btn-blue" style="flex-shrink:0; width:44px; border:1px solid #D9D9D9; border-radius:8px; background:#FFFFFF; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#595959;">
            <svg id="icon-wcq-copy" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2.2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/></svg>
            <svg id="icon-wcq-check" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#1677FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M5 13l4 4 10-11"/></svg>
          </button>
        </div>
        <p id="c1-hint" style="margin:13px 0 0; font-size:12.5px; line-height:1.6; color:#A6A6A6;"></p>
      </section>

      <!-- Sun Yingsha -->
      <section style="background:#FFFFFF; border-radius:14px; padding:26px 24px; box-shadow:0 1px 2px rgba(0,0,0,0.04), 0 0 0 1px #ECEDF0;">
        <div style="display:flex; align-items:center; gap:18px;">
          <img src="sunyingsha.jpg" alt="孙颖莎" style="width:66px; height:66px; flex-shrink:0; border-radius:50%; object-fit:cover; box-shadow:0 0 0 2px #F4EEFC;">
          <div>
            <div id="card2-name" style="font-size:18px; font-weight:700; color:#262626; line-height:1.2;"></div>
            <div style="display:flex; gap:6px; margin-top:8px;">
              <span id="c2-d1" style="font-size:12px; color:#722ED1; background:#F4EEFC; padding:3px 9px; border-radius:6px; font-weight:500;"></span>
              <span id="c2-d2" style="font-size:12px; color:#722ED1; background:#F4EEFC; padding:3px 9px; border-radius:6px; font-weight:500;"></span>
              <span id="c2-d3" style="font-size:12px; color:#722ED1; background:#F4EEFC; padding:3px 9px; border-radius:6px; font-weight:500;"></span>
            </div>
          </div>
        </div>
        <div style="height:1px; background:#F0F0F0; margin:22px 0;"></div>
        <div style="display:flex; flex-direction:column; gap:10px;">
          <a href="https://calendar.google.com/calendar/r?cid=webcal://crslaisa.github.io/table-tennis-calendar/feeds/sunyingsha.ics" target="_blank" rel="noopener" class="btn-pill btn-primary-purple">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><rect x="3.5" y="5" width="17" height="15.5" rx="2.5"/><line x1="3.5" y1="9.5" x2="20.5" y2="9.5"/><line x1="8" y1="3" x2="8" y2="6"/><line x1="16" y1="3" x2="16" y2="6"/></svg>
            <span id="c2-add-google"></span>
          </a>
          <a href="webcal://crslaisa.github.io/table-tennis-calendar/feeds/sunyingsha.ics" class="btn-pill btn-outline-purple">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><rect x="3.5" y="5" width="17" height="15.5" rx="2.5"/><line x1="3.5" y1="9.5" x2="20.5" y2="9.5"/><line x1="8" y1="3" x2="8" y2="6"/><line x1="16" y1="3" x2="16" y2="6"/></svg>
            <span id="c2-add-apple"></span>
          </a>
          <a href="https://outlook.live.com/calendar/0/addfromweb?url=https://crslaisa.github.io/table-tennis-calendar/feeds/sunyingsha.ics" target="_blank" rel="noopener" class="btn-pill btn-outline-purple">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><rect x="3.5" y="5" width="17" height="15.5" rx="2.5"/><line x1="3.5" y1="9.5" x2="20.5" y2="9.5"/><line x1="8" y1="3" x2="8" y2="6"/><line x1="16" y1="3" x2="16" y2="6"/></svg>
            <span id="c2-add-outlook"></span>
          </a>
        </div>
        <div style="display:flex; align-items:stretch; gap:8px; margin-top:16px;">
          <div style="flex:1; min-width:0; display:flex; align-items:center; padding:0 13px; border:1px solid #ECEDF0; border-radius:8px; background:#FAFAFB; font-family:'DM Mono', monospace; font-size:13px; color:#8C8C8C; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">…/feeds/sunyingsha.ics</div>
          <button onclick="copyFeed('sys','https://crslaisa.github.io/table-tennis-calendar/feeds/sunyingsha.ics')" class="copy-btn-purple" style="flex-shrink:0; width:44px; border:1px solid #D9D9D9; border-radius:8px; background:#FFFFFF; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#595959;">
            <svg id="icon-sys-copy" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2.2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/></svg>
            <svg id="icon-sys-check" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#722ED1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M5 13l4 4 10-11"/></svg>
          </button>
        </div>
        <p id="c2-hint" style="margin:13px 0 0; font-size:12.5px; line-height:1.6; color:#A6A6A6;"></p>
      </section>
    </div>

    <div id="footer-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:36px; margin-top:44px; padding-top:36px; border-top:1px solid #ECEDF0;">
      <div>
        <h3 id="footer1-title" style="margin:0 0 10px; font-size:14px; font-weight:700; color:#262626;"></h3>
        <p id="footer1-body" style="margin:0; font-size:13.5px; line-height:1.75; color:#8C8C8C;"></p>
      </div>
      <div>
        <h3 id="footer2-title" style="margin:0 0 10px; font-size:14px; font-weight:700; color:#262626;"></h3>
        <p id="footer2-body" style="margin:0; font-size:13.5px; line-height:1.75; color:#8C8C8C;"></p>
      </div>
    </div>
  </div>
</div>

<script>
const STR = {
  zh: {
    kicker: '乒乓球比赛日历订阅',
    name1: '王楚钦', name2: '孙颖莎', titleSuffix: ' 赛程日历',
    subtitle: '根据公开信息整理，赛事信息公布后 2 小时内更新。订阅之后，莎头的比赛时间将自动同步到你的日历。',
    d1: '单打', d2: '双打', d3: '混双',
    addGoogle: '添加到 Google 日历',
    addApple: '添加到 Apple 日历',
    addOutlook: '添加到 Outlook',
    outlookHint: 'Outlook：「添加日历 → 从网络订阅」，粘贴右侧链接。',
    footer1Title: '关于刷新时间',
    footer1Body: 'Google 日历约每 12–24 小时刷新，Outlook 约 3–24 小时，Apple 日历可在设置中调至最快 5 分钟。',
    footer2Title: '数据来源',
    footer2Body: '赛程信息来自公开发布内容，经整理后发布，可能存在遗漏或延迟。如有错误，请在小红书 @CRSlaisa 提醒修正。',
  },
  en: {
    kicker: 'Match Calendar Subscription',
    name1: 'Wang Chuqin', name2: 'Sun Yingsha', titleSuffix: ' Schedule',
    subtitle: 'Compiled from public sources and updated within about two hours of announcement. Subscribe once and matches sync to your calendar automatically.',
    d1: 'Singles', d2: 'Doubles', d3: 'Mixed',
    addGoogle: 'Add to Google Calendar',
    addApple: 'Add to Apple Calendar',
    addOutlook: 'Add to Outlook',
    outlookHint: 'Outlook: "Add calendar → Subscribe from web", then paste the link.',
    footer1Title: 'Refresh timing',
    footer1Body: 'Google refreshes roughly every 12–24h and Outlook every 3–24h. Apple Calendar can be set as fast as every 5 minutes in settings.',
    footer2Title: 'Data source',
    footer2Body: 'Schedule data is compiled from publicly available content and may contain omissions or delays.',
  },
};

let lang = 'zh';
const copyTimers = {};

function setLang(l) { lang = l; render(); }

function copyFeed(id, url) {
  try { navigator.clipboard && navigator.clipboard.writeText(url); } catch(e) {}
  document.getElementById('icon-' + id + '-copy').style.display = 'none';
  document.getElementById('icon-' + id + '-check').style.display = '';
  clearTimeout(copyTimers[id]);
  copyTimers[id] = setTimeout(function() {
    document.getElementById('icon-' + id + '-copy').style.display = '';
    document.getElementById('icon-' + id + '-check').style.display = 'none';
  }, 1600);
}

function setText(id, text) { var el = document.getElementById(id); if (el) el.textContent = text; }

function render() {
  var t = STR[lang];
  setText('kicker', t.kicker);
  setText('hdr-name1', t.name1); setText('hdr-name2', t.name2); setText('hdr-suffix', t.titleSuffix);
  setText('subtitle', t.subtitle);
  setText('card1-name', t.name1);
  setText('c1-d1', t.d1); setText('c1-d2', t.d2); setText('c1-d3', t.d3);
  setText('c1-add-google', t.addGoogle); setText('c1-add-apple', t.addApple); setText('c1-add-outlook', t.addOutlook);
  setText('c1-hint', t.outlookHint);
  setText('card2-name', t.name2);
  setText('c2-d1', t.d1); setText('c2-d2', t.d2); setText('c2-d3', t.d3);
  setText('c2-add-google', t.addGoogle); setText('c2-add-apple', t.addApple); setText('c2-add-outlook', t.addOutlook);
  setText('c2-hint', t.outlookHint);
  setText('footer1-title', t.footer1Title); setText('footer1-body', t.footer1Body);
  setText('footer2-title', t.footer2Title); setText('footer2-body', t.footer2Body);

  var active = 'border:none; cursor:pointer; padding:7px 22px; border-radius:7px; font-size:14px; font-weight:500; font-family:inherit; background:#FFFFFF; color:#262626; box-shadow:0 1px 2px rgba(0,0,0,0.08); transition:all 0.15s;';
  var inactive = 'border:none; cursor:pointer; padding:7px 22px; border-radius:7px; font-size:14px; font-weight:500; font-family:inherit; background:transparent; color:#595959; transition:all 0.15s;';
  document.getElementById('btn-zh').style.cssText = lang === 'zh' ? active : inactive;
  document.getElementById('btn-en').style.cssText = lang === 'en' ? active : inactive;
}

render();
</script>
</body>
</html>
